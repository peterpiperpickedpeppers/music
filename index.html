---
layout: default
title: Practice Drill Generator
---

<style>
:root{
  --bg: #0b1220;
  --card: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.70);
  --accent: #7c5cff;
  --shadow: 0 18px 50px rgba(0,0,0,0.45);
}

body{
  background:
    radial-gradient(1200px 700px at 20% 0%, rgba(124,92,255,0.25), transparent 60%),
    radial-gradient(900px 600px at 80% 30%, rgba(34,197,94,0.18), transparent 60%),
    var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  margin: 0;
}

main{
  max-width: 900px;
  margin: 48px auto;
  padding: 0 16px;
  display: grid;
  gap: 20px;
}

.generator-section{
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 18px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
}

.generator-section h2{
  margin: 0 0 12px;
  font-size: 1.25rem;
  letter-spacing: 0.2px;
}

button{
  background: linear-gradient(135deg, var(--accent), #3b82f6);
  border: 0;
  color: white;
  font-weight: 650;
  padding: 12px 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 120ms ease, filter 120ms ease;
}

button:hover{ filter: brightness(1.07); }
button:active{ transform: scale(0.98); }

#key-display{
  margin-top: 12px;
  color: var(--muted);
  font-size: 0.95rem;
}

ul{
  list-style: none;
  padding: 0;
  margin: 14px 0 0;
  display: grid;
  gap: 10px;
}

li{
  padding: 10px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.20);
}
</style>

<main>
    <section class="generator-section">
        <h2>Random Combo Generator</h2>
        <button id="generate-combos-btn" type="button">Generate 5 Combos</button>
        <ul id="result-combo">
            <li>---</li>
            <li>---</li>
            <li>---</li>
            <li>---</li>
            <li>---</li>
        </ul>
    </section>

    <section class="generator-section">
        <h2>Diatonic Progression Generator</h2>
        <button id="generate-progression-btn" type="button">Generate Diatonic Progression</button>
        <div id="key-display">Key: ---</div>
        <ul id="result-progression">
            <li>---</li>
            <li>---</li>
            <li>---</li>
            <li>---</li>
            <li>---</li>
        </ul>
    </section>
  
    <section class="generator-section">
      <h2>Mode + String Pair Generator</h2>
      <button id="generate-mode-string-btn" type="button">Generate 5 Unique Pairs</button>
      <ul id="result-mode-string">
        <li>---</li>
        <li>---</li>
        <li>---</li>
        <li>---</li>
        <li>---</li>
      </ul>
    </section>
</main>

<script>
    // --- GEN 1 LOGIC ---
    const listA = ["C", "D", "Eb", "F", "G", "A", "Bb"];  
    const listB = ["Root", "1st Inv", "2nd Inv"];  
    const listC = ["3rd Str", "4th Str", "5th Str", "6th Str"];  
    const listD = ["Major", "Minor", "Diminished", "Whole"];  
    
    document.getElementById("generate-combos-btn").addEventListener("click", () => {
        const listElement = document.getElementById("result-combo");
        listElement.innerHTML = "";
        for (let i = 0; i < 5; i++) {
            const itemA = listA[Math.floor(Math.random() * listA.length)];
            const itemB = listB[Math.floor(Math.random() * listB.length)];
            const itemC = listC[Math.floor(Math.random() * listC.length)];
            const itemD = listD[Math.floor(Math.random() * listD.length)];
            const li = document.createElement("li");
            li.innerText = `${itemA} ${itemD} ${itemC} / ${itemB}`;
            listElement.appendChild(li);
        }
    });

    // --- GEN 2 LOGIC ---
    const keyData = {
        "C Major": ["C Major", "D Minor", "E Minor", "F Major", "G Major", "A Minor", "B Diminished"],
        "D Major": ["D Major", "E Minor", "F# Minor", "G Major", "A Major", "B Minor", "C# Diminished"],
        "Eb Major": ["Eb Major", "F Minor", "G Minor", "Ab Major", "Bb Major", "C Minor", "D Diminished"],
        "F Major": ["F Major", "G Minor", "A Minor", "Bb Major", "C Major", "D Minor", "E Diminished"],
        "G Major": ["G Major", "A Minor", "B Minor", "C Major", "D Major", "E Minor", "F# Diminished"],
        "A Major": ["A Major", "B Minor", "C# Minor", "D Major", "E Major", "F# Minor", "G# Diminished"],
        "Bb Major": ["Bb Major", "C Minor", "D Minor", "Eb Major", "F Major", "G Minor", "A Diminished"]
    };
    const strings = ["3rd Str", "4th Str", "5th Str", "6th Str"];  
    const inversions = ["Root", "1st Inv", "2nd Inv"];  

    document.getElementById("generate-progression-btn").addEventListener("click", () => {
        const keys = Object.keys(keyData);
        const randomKey = keys[Math.floor(Math.random() * keys.length)];
        const chordsInKey = keyData[randomKey];

        // pick ONE string for the whole progression
        const chosenStr = strings[Math.floor(Math.random() * strings.length)];
        
        document.getElementById("key-display").innerText = `Key: ${randomKey} — String: ${chosenStr}`;
        const listElement = document.getElementById("result-progression");
        listElement.innerHTML = "";  

        for (let i = 0; i < 5; i++) {
            const randomChord = chordsInKey[Math.floor(Math.random() * chordsInKey.length)];
            const randomInv = inversions[Math.floor(Math.random() * inversions.length)];
            
            const li = document.createElement("li");
            li.innerText = `${randomChord} (${chosenStr} / ${randomInv})`;
            listElement.appendChild(li);
        }
    });

    // --- GEN 3 LOGIC (unique mode+string pairs) ---
    const modes = ["Ionian", "Dorian", "Phrygian", "Lydian", "Mixolydian", "Aeolian", "Locrian"];
    const modeStrings = ["1st Str", "2nd Str", "3rd Str", "4th Str", "5th Str", "6th Str"];
    
    function shuffleInPlace(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    document.getElementById("generate-mode-string-btn").addEventListener("click", () => {
      const listElement = document.getElementById("result-mode-string");
      listElement.innerHTML = "";
    
      // Build all possible pairs (7 * 6 = 42), shuffle, then take 5
      const pairs = [];
      for (const mode of modes) {
        for (const str of modeStrings) {
          pairs.push(`${mode} ${str}`);
        }
      }
    
      shuffleInPlace(pairs);
    
      for (let i = 0; i < 5; i++) {
        const li = document.createElement("li");
        li.innerText = pairs[i];
        listElement.appendChild(li);
      }
    });
</script>
