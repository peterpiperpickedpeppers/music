<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
:root{
  --bg: #0b1220;
  --card: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.12);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.70);
  --accent: #7c5cff;
  --accent2: #22c55e;
  --shadow: 0 18px 50px rgba(0,0,0,0.45);
}

body{
  background: radial-gradient(1200px 700px at 20% 0%, rgba(124,92,255,0.25), transparent 60%),
              radial-gradient(900px 600px at 80% 30%, rgba(34,197,94,0.18), transparent 60%),
              var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
}

main{
  max-width: 900px;
  margin: 48px auto;
  padding: 0 16px;
  display: grid;
  gap: 20px;
}

a{
  color: inherit;
}

.generator-section{
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 18px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
}

.generator-section h2{
  margin: 0 0 12px;
  font-size: 1.25rem;
  letter-spacing: 0.2px;
}

button{
  background: linear-gradient(135deg, var(--accent), #3b82f6);
  border: 0;
  color: white;
  font-weight: 650;
  padding: 12px 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 120ms ease, filter 120ms ease;
}

button:hover{ filter: brightness(1.07); }
button:active{ transform: scale(0.98); }

#key-display{
  margin-top: 12px;
  color: var(--muted);
  font-size: 0.95rem;
}

ul{
  list-style: none;
  padding: 0;
  margin: 14px 0 0;
  display: grid;
  gap: 10px;
}

li{
  padding: 10px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.20);
}
    </style>
</head>
<body>
    <script>
        // Existing <script> logic goes here
    </script>
    <main>
        <!-- Main content stays the same -->
    </main>
</body>
</html>
